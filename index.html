<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Лера — нейрокреатор</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #0b0b0b;
  color: #efe3d3;
  font-family: 'Playfair Display', serif;
}

.container {
  max-width: 1400px;
  margin: auto;
  padding: 40px;
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 60px;
}

.nav {
  display: flex;
  gap: 40px;
  font-size: 14px;
  opacity: 0.7;
}

.btn {
  border: 1px solid rgba(255,255,255,0.2);
  padding: 12px 24px;
  border-radius: 999px;
}

.hero {
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 40px;
  align-items: center;
}

h1 {
  font-size: 90px;
  line-height: 0.95;
  margin: 0;
}

.accent {
  color: #c27a4a;
}

.sub {
  margin-top: 20px;
  font-size: 20px;
  opacity: 0.7;
}

.buttons {
  margin-top: 30px;
  display: flex;
  gap: 20px;
}

.main-btn {
  background: #c27a4a;
  color: black;
  padding: 16px 32px;
  border-radius: 999px;
}

.image {
  position: relative;
}

.image img {
  width: 100%;
  border-radius: 30px;
}

.glass {
  position: absolute;
  bottom: 20px;
  left: 20px;
  right: 20px;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 25px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  padding: 20px;
}

.block {
  text-align: center;
  font-size: 14px;
}

.block svg {
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="container">

<div class="top">
  <div>✶ AI VISUAL CREATOR</div>

  <div class="nav">
    <div>ПОРТФОЛИО</div>
    <div>КЕЙСЫ</div>
    <div>ОБО МНЕ</div>
    <div>КОНТАКТЫ</div>
  </div>

  <div class="btn">СВЯЗАТЬСЯ</div>
</div>

<div class="hero">

<div>
  <h1>
    Создаю нейроконтент<br>
    и рекламные визуалы:<br>
    <span class="accent">от отдельных креативов</span><br>
    до полноценных кампаний.
  </h1>

  <div class="sub">
    Форматы — от соцсетей до digital и ТВ.
  </div>

  <div class="buttons">
    <div class="main-btn">СМОТРЕТЬ ПОРТФОЛИО</div>
    <div class="btn">МОИ УСЛУГИ</div>
  </div>
</div>

<div class="image">
  <img src="https://i.postimg.cc/3N5wZ6bH/your-image.jpg">

  <div class="glass">

    <div class="block">
      <svg width="24" height="24" stroke="#c27a4a" fill="none">
        <path d="M12 2L14 8L20 10L14 12L12 18L10 12L4 10L10 8Z"/>
      </svg>
      ЭСТЕТИКА
    </div>

    <div class="block">
      <svg width="24" height="24" stroke="#c27a4a" fill="none">
        <rect x="4" y="4" width="16" height="16"/>
      </svg>
      СТРАТЕГИЯ
    </div>

    <div class="block">
      <svg width="24" height="24" stroke="#c27a4a" fill="none">
        <circle cx="12" cy="12" r="9"/>
      </svg>
      AI-ПОДХОД
    </div>

  </div>
</div>

</div>

</div>

</body>
</html>
